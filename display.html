<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>2026i友运动嘉年华足球联赛积分榜</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, "Microsoft YaHei";
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 42px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        .header-info {
            font-size: 16px;
            opacity: 0.9;
        }

        .section {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .section-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #4CAF50;
        }

        .section-title.group-a {
            border-bottom-color: #2196F3;
        }

        .section-title.group-b {
            border-bottom-color: #FF5722;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 16px;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 14px;
        }

        .group-a th {
            background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
        }

        .group-b th {
            background: linear-gradient(135deg, #FF5722 0%, #E64A19 100%);
        }

        tr:hover {
            background-color: #f5f5f5;
            transition: background-color 0.3s;
        }
        .rank {
            font-weight: bold;
            font-size: 18px;
        }
        .rank-1 {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: white;
        }
        .rank-2 {
            background: linear-gradient(135deg, #C0C0C0 0%, #A9A9A9 100%);
            color: white;
        }
        .rank-3 {
            background: linear-gradient(135deg, #CD7F32 0%, #8B4513 100%);
            color: white;
        }
        .team-name {
            font-weight: bold;
            text-align: left;
            padding-left: 15px;
        }
        .points {
            font-weight: bold;
            font-size: 20px;
            color: #4CAF50;
        }
        .positive { color: #4CAF50; font-weight: bold; }
        .negative { color: #f44336; font-weight: bold; }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .refresh-info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 12px;
        }

        .matches-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed #e0e0e0;
        }

        .matches-title {
            font-size: 20px;
            font-weight: bold;
            color: #666;
            margin-bottom: 15px;
        }

        .match-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .match-item {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 5px;
            border-left: 4px solid #4CAF50;
            font-size: 14px;
        }

        .group-a .match-item {
            border-left-color: #2196F3;
        }

        .group-b .match-item {
            border-left-color: #FF5722;
        }

        .match-teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .match-team {
            flex: 1;
            text-align: center;
        }

        .match-team.winner {
            font-weight: bold;
            color: #4CAF50;
        }

        .match-score {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            padding: 0 10px;
        }

        .match-vs {
            color: #999;
            font-size: 12px;
        }

        .match-vs-text {
            color: #999;
            font-size: 14px;
            font-weight: normal;
        }

        .match-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px solid #e0e0e0;
        }

        .match-date {
            font-weight: bold;
            color: #333;
        }

        .match-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 5px;
        }

        .match-status.finished {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .match-status.upcoming {
            background: #fff9c4;
            color: #f57f17;
        }

        .match-item.upcoming {
            opacity: 0.7;
            border-left-style: dashed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚽ 2026i友运动嘉年华足球联赛积分榜</h1>
            <div class="header-info">
                最后更新：<span id="updateTime">--</span>
            </div>
        </div>

        <!-- 总榜 -->
        <div class="section">
            <div class="section-title">🏆 总排名</div>
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px;">排名</th>
                        <th style="text-align: left; padding-left: 15px;">球队</th>
                        <th>赛</th>
                        <th>胜</th>
                        <th>平</th>
                        <th>负</th>
                        <th>进球</th>
                        <th>失球</th>
                        <th>净胜球</th>
                        <th style="width: 80px;">积分</th>
                    </tr>
                </thead>
                <tbody id="standingsTotal"></tbody>
            </table>
            <div id="emptyStateTotal" class="empty-state" style="display:none;">
                <h3>📊 暂无数据</h3>
                <p>请在录入页面添加比赛结果并计算积分</p>
            </div>
        </div>

        <!-- A组 -->
        <div class="section group-a">
            <div class="section-title group-a">🅰️ A组积分榜</div>
            <table class="group-a">
                <thead>
                    <tr>
                        <th style="width: 60px;">排名</th>
                        <th style="text-align: left; padding-left: 15px;">球队</th>
                        <th>赛</th>
                        <th>胜</th>
                        <th>平</th>
                        <th>负</th>
                        <th>进球</th>
                        <th>失球</th>
                        <th>净胜球</th>
                        <th style="width: 80px;">积分</th>
                    </tr>
                </thead>
                <tbody id="standingsGroupA"></tbody>
            </table>
            <div id="emptyStateGroupA" class="empty-state" style="display:none;">
                <h3>📊 暂无数据</h3>
                <p>请在录入页面添加A组比赛结果</p>
            </div>

            <div class="matches-section">
                <div class="matches-title">📋 对战明细</div>
                <div class="match-list" id="matchesGroupA"></div>
            </div>
        </div>

        <!-- B组 -->
        <div class="section group-b">
            <div class="section-title group-b">🅱️ B组积分榜</div>
            <table class="group-b">
                <thead>
                    <tr>
                        <th style="width: 60px;">排名</th>
                        <th style="text-align: left; padding-left: 15px;">球队</th>
                        <th>赛</th>
                        <th>胜</th>
                        <th>平</th>
                        <th>负</th>
                        <th>进球</th>
                        <th>失球</th>
                        <th>净胜球</th>
                        <th style="width: 80px;">积分</th>
                    </tr>
                </thead>
                <tbody id="standingsGroupB"></tbody>
            </table>
            <div id="emptyStateGroupB" class="empty-state" style="display:none;">
                <h3>📊 暂无数据</h3>
                <p>请在录入页面添加B组比赛结果</p>
            </div>

            <div class="matches-section">
                <div class="matches-title">📋 对战明细</div>
                <div class="match-list" id="matchesGroupB"></div>
            </div>
        </div>
    </div>

    <div class="refresh-info" style="display:none;">
        🔄 自动刷新中
    </div>

    <script>
        let teams = {};
        let groupA = [];
        let groupB = [];
        let matchesA = [];
        let matchesB = [];

        async function loadData() {
            // 优先从 data.json 加载（GitHub Pages 模式）
            try {
                const response = await fetch('data.json?t=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    teams = data.teams || {};
                    groupA = data.groupA || [];
                    groupB = data.groupB || [];
                    matchesA = data.matchesA || [];
                    matchesB = data.matchesB || [];

                    console.log('从 data.json 加载数据成功');
                    // 直接返回更新时间
                    return {
                        hasData: Object.keys(teams).length > 0,
                        updateTime: data.updateTime || null
                    };
                }
            } catch (e) {
                console.log('data.json 不存在，尝试从 localStorage 加载');
            }

            // 降级到 localStorage（本地预览模式）
            const saved = localStorage.getItem('footballStandings');
            if (saved) {
                teams = JSON.parse(saved);
            }

            const savedGroupA = localStorage.getItem('footballGroupA');
            if (savedGroupA) {
                groupA = JSON.parse(savedGroupA);
            }

            const savedGroupB = localStorage.getItem('footballGroupB');
            if (savedGroupB) {
                groupB = JSON.parse(savedGroupB);
            }

            const savedMatchesA = localStorage.getItem('footballMatchesA');
            if (savedMatchesA) {
                matchesA = JSON.parse(savedMatchesA);
            }

            const savedMatchesB = localStorage.getItem('footballMatchesB');
            if (savedMatchesB) {
                matchesB = JSON.parse(savedMatchesB);
            }

            return {
                hasData: Object.keys(teams).length > 0,
                updateTime: null
            };
        }

        function sortTeams(teamsList) {
            return teamsList.sort((a, b) => {
                if (b.points !== a.points) return b.points - a.points;
                const diffA = a.goalsFor - a.goalsAgainst;
                const diffB = b.goalsFor - b.goalsAgainst;
                if (diffB !== diffA) return diffB - diffA;
                return b.goalsFor - a.goalsFor;
            });
        }

        function renderTable(tbody, teamsList, emptyStateId) {
            const emptyState = document.getElementById(emptyStateId);
            const table = tbody.closest('table');

            if (teamsList.length === 0) {
                table.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            table.style.display = 'table';
            emptyState.style.display = 'none';

            const sorted = sortTeams([...teamsList]);

            tbody.innerHTML = sorted.map((team, index) => {
                const goalDiff = team.goalsFor - team.goalsAgainst;
                const rank = index + 1;
                let rankClass = '';
                if (rank === 1) rankClass = 'rank-1';
                else if (rank === 2) rankClass = 'rank-2';
                else if (rank === 3) rankClass = 'rank-3';

                const diffColor = goalDiff > 0 ? 'positive' : (goalDiff < 0 ? 'negative' : '');

                return `
                    <tr>
                        <td class="rank ${rankClass}">${rank}</td>
                        <td class="team-name">${team.name}</td>
                        <td>${team.played}</td>
                        <td>${team.won}</td>
                        <td>${team.drawn}</td>
                        <td>${team.lost}</td>
                        <td>${team.goalsFor}</td>
                        <td>${team.goalsAgainst}</td>
                        <td class="${diffColor}">${goalDiff > 0 ? '+' : ''}${goalDiff}</td>
                        <td class="points">${team.points}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderMatches(container, matches) {
            if (matches.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无比赛记录</div>';
                return;
            }

            const today = new Date('2026-07-01');
            today.setHours(0, 0, 0, 0);

            container.innerHTML = matches.map(match => {
                // 判断是否有比分
                const hasScore = match.hasScore !== false && match.homeScore !== null && match.awayScore !== null;

                const homeWin = hasScore && match.homeScore > match.awayScore;
                const awayWin = hasScore && match.awayScore > match.homeScore;
                const draw = hasScore && match.homeScore === match.awayScore;

                // 判断是否已完赛（基于日期或是否有比分）
                let isFinished = hasScore;
                let statusClass = 'finished';
                let statusText = '已完赛';

                if (match.date) {
                    const matchDate = new Date(match.date);
                    matchDate.setHours(0, 0, 0, 0);

                    if (matchDate >= today) {
                        isFinished = false;
                        statusClass = 'upcoming';
                        statusText = '未完赛';
                    }
                }

                // 如果没有比分，默认为未完赛
                if (!hasScore) {
                    isFinished = false;
                    statusClass = 'upcoming';
                    statusText = '未完赛';
                }

                // 格式化日期
                let dateStr = '待定';
                if (match.date) {
                    const d = new Date(match.date);
                    const month = d.getMonth() + 1;
                    const day = d.getDate();
                    const weekday = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][d.getDay()];
                    dateStr = `${month}月${day}日 ${weekday}`;
                }

                // 比分显示：如果没有比分，显示 VS
                const scoreDisplay = hasScore
                    ? `${match.homeScore} : ${match.awayScore}`
                    : '<span class="match-vs-text">VS</span>';

                return `
                    <div class="match-item ${isFinished ? '' : 'upcoming'}">
                        <div class="match-teams">
                            <div class="match-team ${homeWin ? 'winner' : ''}">${match.home}</div>
                            <div class="match-score">${scoreDisplay}</div>
                            <div class="match-team ${awayWin ? 'winner' : ''}">${match.away}</div>
                        </div>
                        <div class="match-info">
                            <span class="match-date">${dateStr}</span>
                            <span style="margin: 0 5px;">•</span>
                            <span>${match.time || '待定'}</span>
                            <span class="match-status ${statusClass}">${statusText}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function updateTable() {
            const result = await loadData();

            // 更新总榜
            const allTeams = Object.values(teams);
            renderTable(document.getElementById('standingsTotal'), allTeams, 'emptyStateTotal');

            // 更新A组
            const groupATeams = allTeams.filter(team => groupA.includes(team.name));
            renderTable(document.getElementById('standingsGroupA'), groupATeams, 'emptyStateGroupA');
            renderMatches(document.getElementById('matchesGroupA'), matchesA);

            // 更新B组
            const groupBTeams = allTeams.filter(team => groupB.includes(team.name));
            renderTable(document.getElementById('standingsGroupB'), groupBTeams, 'emptyStateGroupB');
            renderMatches(document.getElementById('matchesGroupB'), matchesB);

            // 更新时间（直接使用从 data.json 获取的最新时间）
            if (result.hasData && result.updateTime) {
                const updateDate = new Date(result.updateTime);
                document.getElementById('updateTime').textContent = updateDate.toLocaleString('zh-CN');
            } else if (result.hasData) {
                document.getElementById('updateTime').textContent = '未知';
            }
        }

        // 页面加载时更新
        updateTable();

        // 每30秒自动刷新（从 data.json 重新加载）
        setInterval(updateTable, 30000);

        // 监听 localStorage 变化
        window.addEventListener('storage', function(e) {
            if (e.key === 'footballStandings' || e.key === 'footballGroupA' ||
                e.key === 'footballGroupB' || e.key === 'footballMatchesA' ||
                e.key === 'footballMatchesB') {
                updateTable();
            }
        });
    </script>
</body>
</html>
